<script>
let rol = "";
let usuarioNombre = "";

// 🔄 STORAGE
function getUsuarios(){
  return JSON.parse(localStorage.getItem("usuarios")) || [];
}

function setUsuarios(data){
  localStorage.setItem("usuarios", JSON.stringify(data));
}

function getAsistencias(){
  return JSON.parse(localStorage.getItem("asistencias")) || [];
}

function setAsistencias(data){
  localStorage.setItem("asistencias", JSON.stringify(data));
}

// 🚀 INICIALIZACIÓN (IMPORTANTE)
window.onload = () => {
  abrir("login");
};

// NAV
window.abrir = (pantalla) => {
  document.querySelectorAll('.pantalla').forEach(p => p.style.display='none');

  const el = document.getElementById(pantalla);
  if(el) el.style.display='block';

  if (pantalla === "menu") verificarPermisos();
  if (pantalla === "empleados") mostrarUsuario();
};

// REGISTRO
window.registrarUsuario = () => {
  const usuario = document.getElementById("usuario").value.trim();
  const correo = document.getElementById("nuevoCorreo").value.trim();
  const pass = document.getElementById("nuevoPassword").value.trim();

  if(!usuario || !correo || !pass){
    alert("Completa todo");
    return;
  }

  let usuarios = getUsuarios();

  // 🚫 evitar correos duplicados
  if(usuarios.some(u => u.correo === correo)){
    alert("Ese correo ya existe");
    return;
  }

  const rolAsignado = usuario.toLowerCase() === "lorerario"
    ? "admin"
    : "empleado";

  usuarios.push({usuario, correo, pass, rol: rolAsignado});
  setUsuarios(usuarios);

  alert("Registrado correctamente");

  document.getElementById("usuario").value = "";
  document.getElementById("nuevoCorreo").value = "";
  document.getElementById("nuevoPassword").value = "";

  abrir("login");
};

// LOGIN
window.login = () => {
  const correo = document.getElementById("correo").value.trim();
  const pass = document.getElementById("password").value.trim();

  let usuarios = getUsuarios();

  const user = usuarios.find(u => u.correo === correo && u.pass === pass);

  if(!user){
    alert("Credenciales incorrectas");
    return;
  }

  rol = user.rol;
  usuarioNombre = user.usuario;

  abrir("menu");
};

// LOGOUT
window.logout = () => {
  rol = "";
  usuarioNombre = "";
  abrir("login");
};

// PERMISOS
function verificarPermisos(){
  const btnAdmin = document.getElementById("btnAdmin");

  if(!btnAdmin) return;

  if(rol !== "admin"){
    btnAdmin.style.display = "none";

    document.querySelectorAll(".solo-admin").forEach(btn=>{
      btn.disabled = true;
      btn.style.background = "gray";
    });

  } else {
    btnAdmin.style.display = "inline-block";

    document.querySelectorAll(".solo-admin").forEach(btn=>{
      btn.disabled = false;
      btn.style.background = "#007BFF";
    });
  }
}

// USUARIO
function mostrarUsuario(){
  const el = document.getElementById("usuarioActivo");
  if(el){
    el.innerText = "Usuario: " + usuarioNombre + " (" + rol + ")";
  }
}

// ENTRADA
window.registrarEmpleado = () => {
  if(rol !== "admin"){
    alert("Sin permisos");
    return;
  }

  const codigo = document.getElementById("codigoEmpleado").value.trim();

  if(!codigo){
    alert("Ingresa un código");
    return;
  }

  let asistencias = getAsistencias();

  asistencias.push({
    codigo,
    usuario: usuarioNombre,
    fecha: new Date().toLocaleDateString(),
    entrada: new Date().toLocaleTimeString(),
    salida: ""
  });

  setAsistencias(asistencias);

  alert("Entrada registrada");
};

// SALIDA
window.registrarSalida = () => {
  const codigo = document.getElementById("codigoEmpleado").value.trim();

  if(!codigo){
    alert("Ingresa un código");
    return;
  }

  let asistencias = getAsistencias();

  let registro = asistencias.find(a => a.codigo === codigo && a.salida === "");

  if(!registro){
    alert("No hay entrada pendiente");
    return;
  }

  registro.salida = new Date().toLocaleTimeString();
  setAsistencias(asistencias);

  alert("Salida registrada");
};

// MOSTRAR EMPLEADOS
window.mostrarEmpleados = () => {
  let tabla = document.getElementById("tabla");
  if(!tabla) return;

  tabla.innerHTML = "";

  let asistencias = getAsistencias();

  if(asistencias.length === 0){
    tabla.innerHTML = "<tr><td colspan='5'>Sin datos</td></tr>";
    return;
  }

  asistencias.forEach(a => {
    tabla.innerHTML += `
      <tr>
        <td>${a.codigo}</td>
        <td>${a.usuario}</td>
        <td>${a.fecha}</td>
        <td>${a.entrada}</td>
        <td>${a.salida || "-"}</td>
      </tr>
    `;
  });
};

// ADMIN - USUARIOS
window.cargarUsuarios = () => {
  let tabla = document.getElementById("tablaUsuarios");
  if(!tabla) return;

  tabla.innerHTML = "";

  let usuarios = getUsuarios();

  usuarios.forEach(u => {
    tabla.innerHTML += `
      <tr>
        <td>${u.usuario}</td>
        <td>${u.correo}</td>
        <td>${u.rol}</td>
        <td>-</td>
      </tr>
    `;
  });
};

// ADMIN - ASISTENCIAS
window.cargarAsistencias = () => {
  let tabla = document.getElementById("tablaAdmin");
  if(!tabla) return;

  tabla.innerHTML = "";

  let asistencias = getAsistencias();

  asistencias.forEach(a => {
    tabla.innerHTML += `
      <tr>
        <td>${a.codigo}</td>
        <td>${a.usuario}</td>
        <td>${a.fecha}</td>
        <td>${a.entrada}</td>
        <td>${a.salida || "-"}</td>
      </tr>
    `;
  });
};
</script>
