<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Empleados</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #eef2f3;
    }

    button {
      padding: 15px 25px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      font-size: 16px;
    }

    .btn { background: #007BFF; }
    .btn-verde { background: #28a745; }
    .btn-rojo { background: #dc3545; }

    .pantalla {
      display: none;
    }

    #menu {
      display: block;
    }

    .panel {
      margin-top: 20px;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    table {
      margin-top: 20px;
      border-collapse: collapse;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
    }

    th {
      background: #007BFF;
      color: white;
    }
  </style>
</head>
<body>

  <!-- 🟦 MENÚ PRINCIPAL -->
  <div id="menu" class="pantalla">
    <h2>Menú Principal</h2>

    <button class="btn" onclick="abrir('asistencia')">Asistencia</button>
    <button class="btn" onclick="abrir('empleados')">Empleados</button>
    <button class="btn">Reportes</button>
    <button class="btn">Horarios</button>
    <button class="btn">Pagos</button>
    <button class="btn">Configuración</button>
    <button class="btn">Salir</button>
  </div>

  <!-- 🟩 MÓDULO ASISTENCIA -->
  <div id="asistencia" class="pantalla">
    <button onclick="volver()">⬅ Volver</button>

    <div class="panel">
      <h3>Control de Asistencia</h3>

      <input type="text" id="codigo" placeholder="Código">

      <br>

      <button class="btn-verde" onclick="registrar('Entrada')">Entrada</button>
      <button class="btn-rojo" onclick="registrar('Salida')">Salida</button>

      <p id="mensaje"></p>
    </div>

    <table>
      <thead>
        <tr>
          <th>Empleado</th>
          <th>Tipo</th>
          <th>Fecha</th>
          <th>Hora</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </div>

  <!-- 🟨 MÓDULO EMPLEADOS -->
  <div id="empleados" class="pantalla">
    <button onclick="volver()">⬅ Volver</button>

    <div class="panel">
      <h3>Registro de Empleados</h3>

      <input type="text" id="codigoEmpleado" placeholder="Código empleado">

      <br>

      <button class="btn" onclick="registrarEmpleado()">Registrar</button>

      <p id="mensajeEmpleado"></p>
    </div>

    <table>
      <thead>
        <tr>
          <th>Empleado</th>
          <th>Entrada</th>
          <th>Salida</th>
        </tr>
      </thead>
      <tbody id="tablaEmpleados"></tbody>
    </table>
  </div>

  <script>
    function abrir(pantalla) {
      document.querySelectorAll('.pantalla').forEach(p => p.style.display = 'none');
      document.getElementById(pantalla).style.display = 'block';
    }

    function volver() {
      abrir('menu');
    }

    // 🔵 ASISTENCIA (historial)
    function registrar(tipo) {
      const codigo = document.getElementById('codigo').value.trim();

      if (!codigo) {
        alert('Ingrese código');
        return;
      }

      const ahora = new Date();

      const registro = {
        codigo,
        tipo,
        fecha: ahora.toLocaleDateString(),
        hora: ahora.toLocaleTimeString()
      };

      let datos = JSON.parse(localStorage.getItem('registros')) || [];
      datos.push(registro);
      localStorage.setItem('registros', JSON.stringify(datos));

      document.getElementById('mensaje').innerText =
        `Empleado ${codigo} registró ${tipo}`;

      document.getElementById('codigo').value = '';

      mostrarTabla();
    }

    function mostrarTabla() {
      let datos = JSON.parse(localStorage.getItem('registros')) || [];
      const tbody = document.getElementById('tabla');

      tbody.innerHTML = '';

      datos.forEach(r => {
        tbody.innerHTML += `
          <tr>
            <td>${r.codigo}</td>
            <td>${r.tipo}</td>
            <td>${r.fecha}</td>
            <td>${r.hora}</td>
          </tr>
        `;
      });
    }

    // 🟡 EMPLEADOS (entrada/salida automática)
    function registrarEmpleado() {
      const codigo = document.getElementById('codigoEmpleado').value.trim();

      if (!codigo) {
        alert('Ingrese código');
        return;
      }

      let datos = JSON.parse(localStorage.getItem('empleados')) || [];

      let empleado = datos.find(e => e.codigo === codigo);
      const ahora = new Date().toLocaleTimeString();

      if (!empleado) {
        empleado = {
          codigo: codigo,
          entrada: ahora,
          salida: ''
        };
        datos.push(empleado);

        document.getElementById('mensajeEmpleado').innerText =
          `Empleado ${codigo} registró ENTRADA`;

      } else if (!empleado.salida) {
        empleado.salida = ahora;

        document.getElementById('mensajeEmpleado').innerText =
          `Empleado ${codigo} registró SALIDA`;

      } else {
        alert('Este empleado ya registró entrada y salida');
        return;
      }

      localStorage.setItem('empleados', JSON.stringify(datos));

      document.getElementById('codigoEmpleado').value = '';

      mostrarEmpleados();
    }

    function mostrarEmpleados() {
      let datos = JSON.parse(localStorage.getItem('empleados')) || [];
      const tbody = document.getElementById('tablaEmpleados');

      tbody.innerHTML = '';

      datos.forEach(e => {
        tbody.innerHTML += `
          <tr>
            <td>${e.codigo}</td>
            <td>${e.entrada || '-'}</td>
            <td>${e.salida || '-'}</td>
          </tr>
        `;
      });
    }

    // cargar datos al iniciar
    mostrarTabla();
    mostrarEmpleados();
  </script>

</body>
</html>
