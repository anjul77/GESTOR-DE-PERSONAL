<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Empleados</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #eef2f3;
    }

    button {
      padding: 15px 25px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      font-size: 16px;
    }

    .btn { background: #007BFF; }

    .pantalla {
      display: none;
    }

    #menu {
      display: block;
    }

    .panel {
      margin-top: 20px;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    table {
      margin-top: 20px;
      border-collapse: collapse;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
    }

    th {
      background: #007BFF;
      color: white;
    }
  </style>
</head>
<body>

  <!-- 🟦 MENÚ PRINCIPAL -->
  <div id="menu" class="pantalla">
    <h2>🔷 Lorteck - Sistema de Empleados</h2>

    <button class="btn" onclick="abrir('empleados')">Empleados</button>
    <button class="btn">Reportes</button>
    <button class="btn">Horarios</button>
    <button class="btn">Pagos</button>
    <button class="btn">Configuración</button>
    <button class="btn">Salir</button>
  </div>

  <!-- 🟨 MÓDULO EMPLEADOS -->
  <div id="empleados" class="pantalla">
    <button onclick="volver()">⬅ Volver</button>

    <div class="panel">
      <h3>Registro de Empleados</h3>

      <input type="text" id="codigoEmpleado" placeholder="Código empleado">

      <br>

      <button class="btn" onclick="registrarEmpleado()">Registrar</button>

      <p id="mensajeEmpleado"></p>
    </div>

    <table>
      <thead>
        <tr>
          <th>Empleado</th>
          <th>Fecha</th>
          <th>Entrada</th>
          <th>Salida</th>
        </tr>
      </thead>
      <tbody id="tablaEmpleados"></tbody>
    </table>
  </div>

  <script>
    function abrir(pantalla) {
      document.querySelectorAll('.pantalla').forEach(p => p.style.display = 'none');
      document.getElementById(pantalla).style.display = 'block';
    }

    function volver() {
      abrir('menu');
    }

    function registrarEmpleado() {
      const codigo = document.getElementById('codigoEmpleado').value.trim();

      if (!codigo) {
        alert('Ingrese código');
        return;
      }

      let datos = JSON.parse(localStorage.getItem('empleados')) || [];

      let empleado = datos.find(e => e.codigo === codigo);

      const fechaObj = new Date();
      const fecha = fechaObj.toLocaleDateString();
      const hora = fechaObj.toLocaleTimeString();

      if (!empleado) {
        empleado = {
          codigo: codigo,
          fecha: fecha,
          entrada: hora,
          salida: ''
        };
        datos.push(empleado);

        document.getElementById('mensajeEmpleado').innerText =
          `Empleado ${codigo} registró ENTRADA`;

      } else if (!empleado.salida) {
        empleado.salida = hora;

        document.getElementById('mensajeEmpleado').innerText =
          `Empleado ${codigo} registró SALIDA`;

      } else {
        alert('Este empleado ya registró entrada y salida');
        return;
      }

      localStorage.setItem('empleados', JSON.stringify(datos));

      document.getElementById('codigoEmpleado').value = '';

      mostrarEmpleados();
    }

    function mostrarEmpleados() {
      let datos = JSON.parse(localStorage.getItem('empleados')) || [];
      const tbody = document.getElementById('tablaEmpleados');

      tbody.innerHTML = '';

      datos.forEach(e => {
        tbody.innerHTML += `
          <tr>
            <td>${e.codigo}</td>
            <td>${e.fecha || '-'}</td>
            <td>${e.entrada || '-'}</td>
            <td>${e.salida || '-'}</td>
          </tr>
        `;
      });
    }

    // cargar datos al iniciar
    mostrarEmpleados();
  </script>

</body>
</html>
