<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lorteck Empresarial</title>

<style>
body { font-family: Arial; text-align: center; background:#eef2f3; }
button { padding:10px; margin:5px; border:none; border-radius:6px; background:#007BFF; color:white; cursor:pointer; }
input { padding:8px; margin:5px; }
.pantalla { display:none; }
#login { display:block; }

table {
  width:80%;
  margin:auto;
  border-collapse: collapse;
}
th, td {
  border:1px solid #ccc;
  padding:8px;
}
th { background:#007BFF; color:white; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="pantalla">
  <h2>Lorteck</h2>
  <input id="correo" placeholder="Correo"><br>
  <input id="password" type="password" placeholder="Contraseña"><br>
  <button onclick="login()">Iniciar sesión</button>
  <button onclick="abrir('registro')">Registrarse</button>
</div>

<!-- REGISTRO -->
<div id="registro" class="pantalla">
  <h3>Registro</h3>
  <input id="usuario" placeholder="Usuario"><br>
  <input id="nuevoCorreo" placeholder="Correo"><br>
  <input id="nuevoPassword" type="password" placeholder="Contraseña"><br>
  <button onclick="registrarUsuario()">Crear cuenta</button>
  <button onclick="abrir('login')">Volver</button>
</div>

<!-- MENU -->
<div id="menu" class="pantalla">
  <h2>Menú Lorteck</h2>
  <button onclick="abrir('empleados')">Empleados</button>
  <button id="btnAdmin" onclick="abrir('admin')">Panel Admin</button>
  <button onclick="logout()">Cerrar sesión</button>
</div>

<!-- EMPLEADOS -->
<div id="empleados" class="pantalla">
  <h3 id="usuarioActivo"></h3>

  <input id="codigoEmpleado" placeholder="Código"><br>
  <button class="solo-admin" onclick="registrarEmpleado()">Registrar Entrada</button>
  <button class="solo-admin" onclick="registrarSalida()">Registrar Salida</button>

  <br><br>

  <button onclick="mostrarEmpleados()">Actualizar tabla</button>
  <button onclick="abrir('menu')">Volver</button>

  <table>
    <thead>
      <tr>
        <th>Código</th>
        <th>Usuario</th>
        <th>Fecha</th>
        <th>Entrada</th>
        <th>Salida</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<!-- ADMIN -->
<div id="admin" class="pantalla">
  <h2>Panel Administrador</h2>

  <button onclick="cargarUsuarios()">Ver usuarios</button>
  <button onclick="cargarAsistencias()">Ver asistencias</button>
  <button onclick="abrir('menu')">Volver</button>

  <h3>Usuarios</h3>
  <table>
    <thead>
      <tr>
        <th>Usuario</th>
        <th>Correo</th>
        <th>Rol</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="tablaUsuarios"></tbody>
  </table>

  <h3>Asistencias</h3>
  <table>
    <thead>
      <tr>
        <th>Código</th>
        <th>Usuario</th>
        <th>Fecha</th>
        <th>Entrada</th>
        <th>Salida</th>
      </tr>
    </thead>
    <tbody id="tablaAdmin"></tbody>
  </table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore, collection, addDoc, getDocs, query, where, updateDoc, doc, limit
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC2glIFIZb7nr2Oe8W8n7kCxNK30FZHl-U",
  authDomain: "gestor-de-empresas-122.firebaseapp.com",
  projectId: "gestor-de-empresas-122",
  storageBucket: "gestor-de-empresas-122.firebasestorage.app",
  messagingSenderId: "569796799568",
  appId: "1:569796799568:web:66d0add40bce0545433555",
  measurementId: "G-90ZGFLGSTF"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let rol = "";
let usuarioNombre = "";

// NAV
window.abrir = (pantalla) => {
  document.querySelectorAll('.pantalla').forEach(p => p.style.display='none');
  document.getElementById(pantalla).style.display='block';

  if (pantalla === "menu") verificarPermisos();
  if (pantalla === "empleados") mostrarUsuario();
};

// REGISTRO
window.registrarUsuario = async () => {
  try {
    const usuario = document.getElementById("usuario").value;
    const correo = document.getElementById("nuevoCorreo").value;
    const pass = document.getElementById("nuevoPassword").value;

    const cred = await createUserWithEmailAndPassword(auth, correo, pass);

    const rolAsignado = usuario.toLowerCase() === "lorerario"
      ? "admin"
      : "empleado";

    await addDoc(collection(db, "usuarios"), {
      uid: cred.user.uid,
      usuario,
      correo,
      rol: rolAsignado
    });

    alert("Usuario creado");
    abrir("login");

  } catch (e) {
    alert(e.message);
  }
};

// LOGIN
window.login = async () => {
  try {
    const correo = document.getElementById("correo").value;
    const pass = document.getElementById("password").value;

    const cred = await signInWithEmailAndPassword(auth, correo, pass);

    const q = query(collection(db, "usuarios"), where("uid","==",cred.user.uid));
    const snapshot = await getDocs(q);

    snapshot.forEach(doc => {
      rol = doc.data().rol;
      usuarioNombre = doc.data().usuario;
    });

    abrir("menu");

  } catch (e) {
    alert(e.message);
  }
};

// LOGOUT
window.logout = async () => {
  await signOut(auth);
  abrir("login");
};

// PERMISOS
function verificarPermisos(){
  const btnAdmin = document.getElementById("btnAdmin");

  if(rol !== "admin"){
    btnAdmin.style.display = "none";

    document.querySelectorAll(".solo-admin").forEach(btn=>{
      btn.disabled = true;
      btn.style.background = "gray";
    });

  } else {
    btnAdmin.style.display = "inline-block";
  }
}

// USUARIO
function mostrarUsuario(){
  document.getElementById("usuarioActivo").innerText =
    "Usuario: " + usuarioNombre + " (" + rol + ")";
}

// ENTRADA
window.registrarEmpleado = async () => {
  if(rol !== "admin"){ alert("Sin permisos"); return; }

  const codigo = document.getElementById("codigoEmpleado").value;

  await addDoc(collection(db,"asistencias"),{
    codigo,
    usuario: usuarioNombre,
    fecha: new Date().toLocaleDateString(),
    entrada: new Date().toLocaleTimeString(),
    salida: ""
  });

  alert("Entrada registrada");
};

// SALIDA
window.registrarSalida = async () => {
  const codigo = document.getElementById("codigoEmpleado").value;

  const q = query(
    collection(db,"asistencias"),
    where("codigo","==",codigo),
    where("salida","==",""),
    limit(1)
  );

  const snapshot = await getDocs(q);

  if(snapshot.empty){
    alert("No hay entrada pendiente");
    return;
  }

  const d = snapshot.docs[0];

  await updateDoc(doc(db,"asistencias",d.id),{
    salida: new Date().toLocaleTimeString()
  });

  alert("Salida registrada");
};

// TABLA
window.mostrarEmpleados = async () => {
  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  const snapshot = await getDocs(collection(db,"asistencias"));

  snapshot.forEach(doc=>{
    const d = doc.data();

    tabla.innerHTML += `
      <tr>
        <td>${d.codigo}</td>
        <td>${d.usuario}</td>
        <td>${d.fecha}</td>
        <td>${d.entrada}</td>
        <td>${d.salida || "-"}</td>
      </tr>
    `;
  });
};

// ADMIN
window.cargarUsuarios = async () => {
  if(rol !== "admin") return;

  const tabla = document.getElementById("tablaUsuarios");
  tabla.innerHTML = "";

  const snapshot = await getDocs(collection(db,"usuarios"));

  snapshot.forEach(docu=>{
    const d = docu.data();

    tabla.innerHTML += `
      <tr>
        <td>${d.usuario}</td>
        <td>${d.correo}</td>
        <td>${d.rol}</td>
        <td>
          <button onclick="cambiarRol('${docu.id}','${d.rol}')">
            Cambiar Rol
          </button>
        </td>
      </tr>
    `;
  });
};

window.cambiarRol = async (id, rolActual) => {
  if(rol !== "admin") return;

  const nuevoRol = rolActual === "admin" ? "empleado" : "admin";

  await updateDoc(doc(db,"usuarios",id),{
    rol: nuevoRol
  });

  alert("Rol actualizado");
  cargarUsuarios();
};

window.cargarAsistencias = async () => {
  if(rol !== "admin") return;

  const tabla = document.getElementById("tablaAdmin");
  tabla.innerHTML = "";

  const snapshot = await getDocs(collection(db,"asistencias"));

  snapshot.forEach(docu=>{
    const d = docu.data();

    tabla.innerHTML += `
      <tr>
        <td>${d.codigo}</td>
        <td>${d.usuario}</td>
        <td>${d.fecha}</td>
        <td>${d.entrada}</td>
        <td>${d.salida || "-"}</td>
      </tr>
    `;
  });
};

</script>

</body>
</html>
