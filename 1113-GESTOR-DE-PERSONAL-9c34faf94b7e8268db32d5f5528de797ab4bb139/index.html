<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Empleados</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #eef2f3;
    }

    button {
      padding: 20px 40px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background-color: #007BFF;
      color: white;
    }

    button:hover {
      background-color: #0056b3;
    }

    .panel {
      display: none;
      margin-top: 20px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
      padding: 10px;
      margin-top: 10px;
      width: 200px;
    }

    .acciones button {
      margin: 10px;
      background-color: #28a745;
    }

    .acciones button:last-child {
      background-color: #dc3545;
    }
  </style>
</head>
<body>

  <button onclick="mostrarPanel()">Asistencia</button>

  <div class="panel" id="panelAsistencia">
    <h3>Ingrese su código</h3>
    <input type="text" id="codigo" placeholder="Código del empleado">

    <div class="acciones">
      <button onclick="registrar('Asistencia')">Asistencia</button>
      <button onclick="registrar('Ausencia')">Ausencia</button>
    </div>

    <p id="mensaje"></p>
  </div>

  <script>
    function mostrarPanel() {
      document.getElementById('panelAsistencia').style.display = 'block';
    }

    function registrar(tipo) {
      const codigo = document.getElementById('codigo').value;

      if (codigo === '') {
        alert('Por favor ingrese su código');
        return;
      }

      document.getElementById('mensaje').innerText =
        'Empleado ' + codigo + ' registró: ' + tipo;
    }
  </script>

</body>
</html>
