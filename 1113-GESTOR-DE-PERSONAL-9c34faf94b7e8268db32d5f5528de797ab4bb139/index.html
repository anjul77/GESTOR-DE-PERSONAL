<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control de Empleados</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #eef2f3;
    }

    button {
      padding: 15px 25px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      font-size: 16px;
    }

    .btn-azul { background: #007BFF; }
    .btn-verde { background: #28a745; }
    .btn-rojo { background: #dc3545; }

    .panel {
      margin-top: 20px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      display: none;
    }

    input {
      padding: 10px;
      margin: 10px;
    }

    table {
      margin-top: 20px;
      border-collapse: collapse;
      width: 80%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
    }

    th {
      background: #007BFF;
      color: white;
    }
  </style>
</head>
<body>

  <button class="btn-azul" onclick="mostrarPanel()">Asistencia</button>
  <button onclick="limpiarDatos()">Borrar registros</button>

  <div class="panel" id="panel">
    <h3>Ingrese su código</h3>
    <input type="text" id="codigo">

    <br>

    <button class="btn-verde" onclick="registrar('Entrada')">Entrada</button>
    <button class="btn-rojo" onclick="registrar('Salida')">Salida</button>

    <p id="mensaje"></p>
  </div>

  <table id="tabla">
    <thead>
      <tr>
        <th>Empleado</th>
        <th>Tipo</th>
        <th>Fecha</th>
        <th>Hora</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    function mostrarPanel() {
      document.getElementById('panel').style.display = 'block';
    }

    function registrar(tipo) {
      const codigo = document.getElementById('codigo').value.trim();

      if (!codigo) {
        alert('Ingrese código');
        return;
      }

      const ahora = new Date();

      const registro = {
        codigo,
        tipo,
        fecha: ahora.toLocaleDateString(),
        hora: ahora.toLocaleTimeString()
      };

      let datos = JSON.parse(localStorage.getItem('registros')) || [];

      datos.push(registro);
      localStorage.setItem('registros', JSON.stringify(datos));

      document.getElementById('mensaje').innerText =
        `Empleado ${codigo} registró ${tipo}`;

      document.getElementById('codigo').value = '';

      mostrarTabla();
    }

    function mostrarTabla() {
      let datos = JSON.parse(localStorage.getItem('registros')) || [];
      const tbody = document.querySelector('#tabla tbody');

      tbody.innerHTML = '';

      datos.forEach(r => {
        let fila = `
          <tr>
            <td>${r.codigo}</td>
            <td>${r.tipo}</td>
            <td>${r.fecha}</td>
            <td>${r.hora}</td>
          </tr>
        `;
        tbody.innerHTML += fila;
      });
    }

    function limpiarDatos() {
      if (confirm('¿Borrar todos los registros?')) {
        localStorage.removeItem('registros');
        mostrarTabla();
      }
    }

    // Cargar datos al abrir
    mostrarTabla();
  </script>

</body>
</html>
